# Project-wide Gradle settings.
# Specifies the JVM arguments used for the daemon process.
# Highly optimized for low-memory sandbox environments.
org.gradle.jvmargs=-Xmx768m -Xss512k -XX:MaxMetaspaceSize=512m -XX:+UseSerialGC -XX:TieredStopAtLevel=1 -XX:CICompilerCount=2 -Dfile.encoding=UTF-8

# Limit Kotlin compiler daemon memory to prevent Native OOM (malloc failure)
kotlin.daemon.jvmopts=-Xmx384m -Xss512k -XX:+UseSerialGC -XX:TieredStopAtLevel=1
kotlin.compiler.execution.strategy=in-process

# Disable memory-heavy caching and parallelization features
org.gradle.parallel=false
org.gradle.caching=false
org.gradle.workers.max=1
kotlin.incremental=false

# Kotlin code style for this project: "official" or "obsolete"
kotlin.code.style=official
android.overridePathCheck=true
